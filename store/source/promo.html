<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dictozy Promotional Tile</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 440px;
        height: 280px;
        margin: 0;
        overflow: hidden;
      }

      body {
        position: relative;
        display: grid;
        place-items: center;
        background: #f3f7f6;
        color: #17212b;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .tile {
        position: relative;
        display: grid;
        width: 440px;
        height: 280px;
        grid-template-columns: 174px 1fr;
        overflow: hidden;
        background: #f8fbfa;
      }

      .tile::before {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgb(45 212 191 / 16%) 0%, transparent 42%),
          radial-gradient(circle at 92% 16%, rgb(220 38 38 / 12%), transparent 22%);
        content: "";
      }

      .brand-panel {
        position: relative;
        z-index: 1;
        display: flex;
        min-width: 0;
        flex-direction: column;
        justify-content: space-between;
        padding: 24px 22px 22px;
        background: #102a43;
        color: #ffffff;
      }

      .brand-lockup {
        display: grid;
        gap: 12px;
      }

      .brand-lockup img {
        width: 50px;
        height: 50px;
        border: 1px solid rgb(255 255 255 / 20%);
        border-radius: 8px;
        box-shadow: 0 16px 28px rgb(0 0 0 / 22%);
      }

      .brand-lockup strong {
        display: block;
        font-size: 26px;
        font-weight: 760;
        letter-spacing: 0;
        line-height: 1;
      }

      .brand-lockup span {
        display: block;
        margin-top: 5px;
        color: #a7f3d0;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.2;
      }

      .tagline {
        margin: 0;
        max-width: 128px;
        color: #dceff0;
        font-size: 15px;
        font-weight: 650;
        line-height: 1.28;
      }

      .product-preview {
        position: relative;
        z-index: 1;
        display: grid;
        place-items: center;
        padding: 24px 24px 24px 26px;
      }

      .browser-card {
        width: 214px;
        overflow: hidden;
        border: 1px solid #d3dfe2;
        border-radius: 8px;
        background: #ffffff;
        box-shadow: 0 20px 44px rgb(16 42 67 / 16%);
      }

      .browser-top {
        display: flex;
        align-items: center;
        gap: 6px;
        height: 30px;
        padding: 0 10px;
        border-bottom: 1px solid #e2eaec;
        background: #f6f9fa;
      }

      .browser-top span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #c6d3d7;
      }

      .address {
        width: 96px;
        height: 9px;
        margin-left: 4px;
        border-radius: 4px;
        background: #e1ebee;
      }

      .field {
        padding: 18px 16px 16px;
      }

      .field-lines {
        display: grid;
        gap: 8px;
      }

      .field-lines span {
        height: 8px;
        border-radius: 999px;
        background: #dbe7ea;
      }

      .field-lines span:nth-child(1) {
        width: 132px;
      }

      .field-lines span:nth-child(2) {
        width: 160px;
      }

      .field-lines span:nth-child(3) {
        width: 88px;
        background: #bfe7df;
      }

      .dictation-strip {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 22px;
      }

      .mic-button {
        display: grid;
        width: 42px;
        height: 42px;
        min-width: 42px;
        place-items: center;
        border-radius: 50%;
        background: #0f766e;
        box-shadow: 0 10px 20px rgb(15 118 110 / 24%);
      }

      .mic-button svg {
        width: 22px;
        height: 22px;
        fill: none;
        stroke: #ffffff;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2.2;
      }

      .waveform {
        display: flex;
        height: 34px;
        align-items: center;
        gap: 5px;
      }

      .waveform span {
        width: 5px;
        border-radius: 999px;
        background: #123653;
      }

      .waveform span:nth-child(1),
      .waveform span:nth-child(5) {
        height: 14px;
        opacity: 0.5;
      }

      .waveform span:nth-child(2),
      .waveform span:nth-child(4) {
        height: 24px;
        opacity: 0.75;
      }

      .waveform span:nth-child(3) {
        height: 32px;
      }

      .stop-dot {
        display: grid;
        width: 24px;
        height: 24px;
        place-items: center;
        border-radius: 50%;
        background: #fee2e2;
      }

      .stop-dot::before {
        width: 9px;
        height: 9px;
        border-radius: 2px;
        background: #dc2626;
        content: "";
      }
    </style>
  </head>
  <body>
    <main class="tile">
      <section class="brand-panel" aria-label="Dictozy brand">
        <div class="brand-lockup">
          <img src="../../extension/icons/icon-128.png" alt="">
          <div>
            <strong>Dictozy</strong>
            <span>Voice Dictation</span>
          </div>
        </div>
        <p class="tagline">Speak. Transcribe. Keep writing.</p>
      </section>
      <section class="product-preview" aria-label="Dictation preview">
        <div class="browser-card">
          <div class="browser-top">
            <span></span><span></span><span></span>
            <div class="address"></div>
          </div>
          <div class="field">
            <div class="field-lines" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <div class="dictation-strip">
              <div class="mic-button" aria-hidden="true">
                <svg viewBox="0 0 24 24">
                  <path d="M12 4a3 3 0 0 0-3 3v5a3 3 0 0 0 6 0V7a3 3 0 0 0-3-3z"></path>
                  <path d="M5 11a7 7 0 0 0 14 0"></path>
                  <path d="M12 18v3"></path>
                </svg>
              </div>
              <div class="waveform" aria-hidden="true">
                <span></span><span></span><span></span><span></span><span></span>
              </div>
              <div class="stop-dot" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
