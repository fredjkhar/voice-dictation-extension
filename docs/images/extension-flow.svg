<svg xmlns="http://www.w3.org/2000/svg" width="960" height="300" viewBox="0 0 960 300" role="img" aria-labelledby="title desc">
  <title id="title">Voice dictation MVP flow</title>
  <desc id="desc">Diagram showing the extension sending audio to FastAPI, which calls xAI Speech-to-Text and returns a transcript.</desc>
  <rect width="960" height="300" fill="#f8fafc"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
  <g font-family="system-ui, -apple-system, Segoe UI, sans-serif">
    <rect x="58" y="82" width="190" height="120" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="92" y="126" fill="#111827" font-size="20" font-weight="700">Chrome Extension</text>
    <text x="84" y="158" fill="#475569" font-size="14">records after user click</text>
    <text x="93" y="180" fill="#475569" font-size="14">inserts transcript</text>
    <rect x="386" y="82" width="190" height="120" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="428" y="126" fill="#111827" font-size="20" font-weight="700">FastAPI Backend</text>
    <text x="428" y="158" fill="#475569" font-size="14">validates audio</text>
    <text x="415" y="180" fill="#475569" font-size="14">keeps API key secret</text>
    <rect x="712" y="82" width="190" height="120" rx="9" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="760" y="126" fill="#111827" font-size="20" font-weight="700">xAI STT</text>
    <text x="749" y="158" fill="#475569" font-size="14">Speech-to-Text</text>
    <text x="755" y="180" fill="#475569" font-size="14">returns transcript</text>
    <line x1="256" y1="142" x2="374" y2="142" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="584" y1="142" x2="700" y2="142" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="292" y="128" fill="#334155" font-size="13">audio</text>
    <text x="626" y="128" fill="#334155" font-size="13">audio</text>
    <path d="M712 218 C600 264 360 264 248 218" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="438" y="270" fill="#334155" font-size="13">transcript returns through backend</text>
  </g>
</svg>
