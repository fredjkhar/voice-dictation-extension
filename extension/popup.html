<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voice Dictation</title>
    <style>
      body {
        width: 260px;
        margin: 0;
        padding: 16px;
        color: #1f2937;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 650;
      }

      p {
        margin: 0;
        color: #4b5563;
        font-size: 13px;
        line-height: 1.4;
      }

      button {
        width: 100%;
        min-height: 36px;
        margin-top: 14px;
        border: 1px solid #1f2937;
        border-radius: 6px;
        background: #1f2937;
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 600;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.65;
      }

      #status {
        min-height: 18px;
        margin-top: 10px;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <h1>Voice Dictation</h1>
    <p>Focus a supported text field, then use the page Mic button or this test control.</p>
    <button id="insertFakeText" type="button">Insert Test Text</button>
    <p id="status" aria-live="polite"></p>
    <script src="popup.js"></script>
  </body>
</html>
