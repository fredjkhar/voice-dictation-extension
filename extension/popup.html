<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dictozy</title>
    <style>
      :root {
        color-scheme: light;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --border: #d8e0ea;
        --ink: #17212b;
        --muted: #64748b;
        --panel: #ffffff;
        --page: #f7f9fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        color: var(--ink);
        background: var(--page);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .popup-shell {
        display: grid;
        gap: 14px;
        padding: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .brand-mark {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid #bfe3dc;
        border-radius: 8px;
        background: #eaf8f5;
      }

      .brand-mark img {
        width: 24px;
        height: 24px;
      }

      h1 {
        margin: 0;
        font-size: 19px;
        font-weight: 760;
        letter-spacing: 0;
      }

      p {
        margin: 0;
      }

      .subtitle,
      .toggle-description,
      .field-help {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
      }

      .settings-panel,
      .advanced {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
      }

      .settings-panel {
        display: grid;
        gap: 13px;
        padding: 12px;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .toggle-copy,
      .field-label {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .toggle-title,
      .field-title {
        color: #233244;
        font-size: 13px;
        font-weight: 720;
      }

      .switch {
        position: relative;
        width: 44px;
        min-width: 44px;
        height: 26px;
        margin: 0;
        appearance: none;
        border: 1px solid #9aaabe;
        border-radius: 999px;
        background: #dbe4ee;
        cursor: pointer;
        transition: background-color 140ms ease, border-color 140ms ease;
      }

      .switch::before {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: #ffffff;
        box-shadow: 0 1px 4px rgb(15 23 42 / 22%);
        transition: transform 140ms ease;
      }

      .switch:checked {
        border-color: var(--accent);
        background: var(--accent);
      }

      .switch:checked::before {
        transform: translateX(18px);
      }

      .switch:focus-visible,
      input:focus-visible,
      button:focus-visible,
      summary:focus-visible {
        outline: 3px solid #38bdf8;
        outline-offset: 2px;
      }

      form {
        display: grid;
        gap: 10px;
      }

      input[type="number"],
      input[type="url"] {
        width: 100%;
        min-height: 36px;
        border: 1px solid #c5d0de;
        border-radius: 7px;
        background: #ffffff;
        color: #111827;
        font: inherit;
        font-size: 13px;
        letter-spacing: 0;
        padding: 7px 9px;
      }

      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        border: 1px solid transparent;
        border-radius: 7px;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 720;
        letter-spacing: 0;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      .primary-button {
        background: var(--accent);
        color: #ffffff;
      }

      .primary-button:hover {
        background: var(--accent-strong);
      }

      .secondary-button {
        width: 100%;
        border-color: #c5d0de;
        background: #ffffff;
        color: #233244;
      }

      .secondary-button:hover {
        border-color: #94a3b8;
        background: #f8fafc;
      }

      .advanced {
        padding: 0;
      }

      summary {
        padding: 11px 12px;
        color: #233244;
        cursor: pointer;
        font-size: 13px;
        font-weight: 720;
      }

      .advanced-fields {
        display: grid;
        gap: 10px;
        padding: 0 12px 12px;
      }

      .status {
        min-height: 18px;
        color: #36516f;
        font-size: 12px;
        line-height: 1.4;
      }

      .status[data-tone="success"] {
        color: #047857;
      }

      .status[data-tone="warning"] {
        color: #b45309;
      }

      .status[data-tone="error"] {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <main class="popup-shell">
      <header class="brand">
        <span class="brand-mark" aria-hidden="true">
          <img src="icons/icon-32.png" alt="">
        </span>
        <div>
          <h1>Dictozy</h1>
          <p class="subtitle">Dictate into supported web fields</p>
        </div>
      </header>

      <section class="settings-panel" aria-label="Dictozy settings">
        <label class="toggle-row">
          <span class="toggle-copy">
            <span class="toggle-title">Dictation</span>
            <span class="toggle-description">Show the microphone on supported fields.</span>
          </span>
          <input id="extensionEnabled" class="switch" type="checkbox" role="switch">
        </label>

        <form id="settingsForm">
          <label class="field-label">
            <span class="field-title">Recording limit</span>
            <span class="field-help">1 to 30 seconds</span>
            <input id="recordingDurationSeconds" type="number" min="1" max="30" step="1">
          </label>
          <button id="saveSettings" class="primary-button" type="button">Save Settings</button>
        </form>
      </section>

      <details class="advanced">
        <summary>Advanced Backend</summary>
        <div class="advanced-fields">
          <label class="field-label">
            <span class="field-title">Backend URL</span>
            <input id="backendUrl" type="url" autocomplete="off" spellcheck="false">
          </label>
          <button id="testBackend" class="secondary-button" type="button">Check Backend</button>
        </div>
      </details>

      <p id="status" class="status" data-tone="neutral" aria-live="polite"></p>
    </main>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
