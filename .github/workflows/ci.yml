name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q

  extension:
    name: Extension Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate manifest JSON
        run: python3 -m json.tool extension/manifest.json >/dev/null

      - name: Check extension JavaScript syntax
        run: |
          node --check extension/content.js
          node --check extension/background.js
          node --check extension/popup.js
          node --check extension/config.js

      - name: Validate extension package inputs
        run: python3 scripts/package_extension.py --check-only

      - name: Validate store assets
        run: python3 scripts/validate_store_assets.py
